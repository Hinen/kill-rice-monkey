name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore KillRiceMonkey.sln

      - name: Build
        run: dotnet build KillRiceMonkey.sln -c Release --no-restore

      - name: Test
        run: dotnet test KillRiceMonkey.sln -c Release --no-build

      - name: Publish
        run: dotnet publish src/KillRiceMonkey.App/KillRiceMonkey.App.csproj -c Release --no-build

      - name: Remove unnecessary runtimes
        run: |
          $pub = "src/KillRiceMonkey.App/publish-output"
          Remove-Item -Recurse -Force "$pub/.playwright/node/darwin-arm64" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pub/.playwright/node/darwin-x64" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pub/.playwright/node/linux-arm64" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pub/.playwright/node/linux-x64" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pub/runtimes/linux-x64" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pub/runtimes/win-x86" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pub/runtimes/browser" -ErrorAction SilentlyContinue
          Remove-Item -Force "$pub/runtimes/win-x64/native/onnxruntime_providers_cuda*" -ErrorAction SilentlyContinue
          Remove-Item -Force "$pub/runtimes/win-x64/native/onnxruntime_providers_tensorrt*" -ErrorAction SilentlyContinue
          Remove-Item -Force "$pub/runtimes/win-x64/native/*.lib" -ErrorAction SilentlyContinue

      - name: Zip
        run: Compress-Archive -Path src/KillRiceMonkey.App/publish-output/* -DestinationPath KillRiceMonkey-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: KillRiceMonkey-${{ github.ref_name }}.zip
          generate_release_notes: true
